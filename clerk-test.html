<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clerk Token Generator for Testing</title>
  </head>
  <body style="font-family: sans-serif; padding: 2rem;">
    <h2>Trade License API - Clerk Token Generator</h2>
    <p>Use this page to log in and get a valid Bearer token for Swagger or Postman.</p>
    
    <div id="app"></div>
    
    <div style="margin-top: 2rem;">
      <h3>Your Token:</h3>
      <textarea id="token-box" style="width: 100%; height: 150px; padding: 10px;" readonly placeholder="Sign in to generate token..."></textarea>
      <button onclick="copyToken()" style="margin-top: 10px; padding: 5px 10px;">Copy Token</button>
    </div>

    <!-- Initialize Clerk with your Publishable Key -->
    <script
      async
      crossorigin="anonymous"
      data-clerk-publishable-key="pk_test_bm92ZWwtd2FydGhvZy00MC5jbGVyay5hY2NvdW50cy5kZXYk"
      src="https://novel-warthog-40.clerk.accounts.dev/npm/@clerk/clerk-js@4/dist/clerk.browser.js"
      type="text/javascript"
    ></script>

    <script>
      window.addEventListener('load', async function () {
        await window.Clerk.load();

        if (window.Clerk.user) {
          document.getElementById('app').innerHTML = `
            <div id="user-button"></div>
            <p>Signed in as: ${window.Clerk.user.primaryEmailAddress.emailAddress}</p>
          `;
          window.Clerk.mountUserButton(document.getElementById('user-button'));
          
          // Get the session token
          const token = await window.Clerk.session.getToken();
          document.getElementById('token-box').value = token;
        } else {
          document.getElementById('app').innerHTML = `<div id="sign-in"></div>`;
          window.Clerk.mountSignIn(document.getElementById('sign-in'));
        }
      });

      function copyToken() {
        const tokenBox = document.getElementById('token-box');
        tokenBox.select();
        document.execCommand('copy');
        alert("Token copied! Paste this into Swagger or Postman.");
      }
    </script>
  </body>
</html>
