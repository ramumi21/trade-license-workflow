services:
  postgres:
    image: postgres:16
    container_name: xj3395_db
    environment:
      POSTGRES_DB: xj3395
      POSTGRES_USER: xj3395_user
      POSTGRES_PASSWORD: xj3395_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: xj3395_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@xj3395.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
